<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}git_sync{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #0a0c10;
    --surface:      #13161d;
    --surface-2:    #1c2029;
    --border:       #2a2f3a;
    --border-soft:  #1f242e;
    --text:         #e8e6e3;
    --text-muted:   #8a8d96;
    --text-faint:   #5a5d66;
    --accent:       #ff9a3c;
    --accent-soft:  rgba(255,154,60,.12);
    --success:      #7ee787;
    --success-soft: rgba(126,231,135,.12);
    --danger:       #ff6b6b;
    --danger-soft:  rgba(255,107,107,.12);
    --warning:      #fbbf24;
    --warning-soft: rgba(251,191,36,.12);

    --mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --sans: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.55;
    /* subtle grid texture */
    background-image:
      linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 32px 32px;
    background-position: -1px -1px;
    min-height: 100vh;
  }

  /* === Header ============================================================ */
  header.bar {
    border-bottom: 1px solid var(--border);
    background: rgba(13, 16, 22, 0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 0.85rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header.bar .brand {
    font-family: var(--mono);
    font-weight: 600;
    font-size: 0.95rem;
    letter-spacing: 0.02em;
    color: var(--text);
    text-decoration: none;
    display: inline-flex;
    align-items: baseline;
    gap: 0.4rem;
  }
  header.bar .brand::before {
    content: "▸";
    color: var(--accent);
    font-weight: 400;
  }
  header.bar .brand .slash {
    color: var(--text-faint);
    font-weight: 400;
  }
  header.bar nav {
    display: flex;
    gap: 1.25rem;
    align-items: center;
    font-family: var(--mono);
    font-size: 0.85rem;
  }
  header.bar nav a {
    color: var(--text-muted);
    text-decoration: none;
    transition: color 120ms ease;
  }
  header.bar nav a:hover { color: var(--text); }
  header.bar .user-tag {
    color: var(--text-faint);
    font-family: var(--mono);
    font-size: 0.8rem;
  }
  header.bar .user-tag span { color: var(--text-muted); }

  /* === Main content ===================================================== */
  main {
    max-width: 1180px;
    margin: 0 auto;
    padding: 2.5rem 2rem 4rem;
  }

  h2 {
    font-family: var(--sans);
    font-weight: 600;
    font-size: 1.4rem;
    margin: 0 0 0.5rem;
    letter-spacing: -0.01em;
  }
  h2 .subtitle {
    display: block;
    font-family: var(--mono);
    font-weight: 400;
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 0.25rem;
    letter-spacing: 0;
  }

  /* === Flash messages =================================================== */
  .flash {
    padding: 0.7rem 1rem;
    border-radius: 4px;
    margin-bottom: 1.25rem;
    border: 1px solid;
    font-family: var(--mono);
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .flash::before {
    font-weight: 600;
    flex-shrink: 0;
  }
  .flash-error   { background: var(--danger-soft);  color: var(--danger);  border-color: rgba(255,107,107,.3); }
  .flash-error::before { content: "✗"; }
  .flash-success { background: var(--success-soft); color: var(--success); border-color: rgba(126,231,135,.3); }
  .flash-success::before { content: "✓"; }
  .flash-warning { background: var(--warning-soft); color: var(--warning); border-color: rgba(251,191,36,.3); }
  .flash-warning::before { content: "!"; }

  /* === Tables =========================================================== */
  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  th, td {
    padding: 0.85rem 1rem;
    text-align: left;
    border-bottom: 1px solid var(--border-soft);
    vertical-align: middle;
  }
  thead { background: var(--surface-2); }
  th {
    font-family: var(--mono);
    font-weight: 500;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.015); }
  td.actions { text-align: right; white-space: nowrap; position: relative; }
  td.actions form, td.actions a { margin-left: 0.4rem; }
  td.actions details.force-zone { margin-left: 0.4rem; }
  td.actions form:first-child, td.actions a:first-child { margin-left: 0; }

  /* === Buttons ========================================================== */
  .btn {
    display: inline-block;
    padding: 0.45rem 0.95rem;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text);
    text-decoration: none;
    cursor: pointer;
    font: inherit;
    font-family: var(--mono);
    font-size: 0.82rem;
    transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
    line-height: 1.3;
  }
  .btn:hover { background: var(--border); border-color: var(--text-faint); }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #1a1208;
    font-weight: 600;
  }
  .btn-primary:hover { background: #ffac5e; border-color: #ffac5e; }

  .btn-danger { color: var(--danger); border-color: rgba(255,107,107,.3); }
  .btn-danger:hover { background: var(--danger-soft); border-color: var(--danger); }

  .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.78rem; }

  form.inline { display: inline; }

  /* === Forms ============================================================ */
  fieldset {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1.1rem 1.25rem 0.5rem;
    margin: 0 0 1.25rem;
    background: var(--surface);
  }
  fieldset > legend {
    padding: 0 0.5rem;
    font-family: var(--mono);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    font-weight: 500;
  }

  label.field {
    display: block;
    margin-bottom: 1rem;
  }
  label.field > span.label {
    display: block;
    font-family: var(--mono);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 0.4rem;
    font-weight: 500;
  }

  input[type=text],
  input[type=password],
  textarea,
  select {
    width: 100%;
    padding: 0.6rem 0.8rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.88rem;
    transition: border-color 120ms ease;
  }
  input[type=text]:focus,
  input[type=password]:focus,
  textarea:focus,
  select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  input[type=text]::placeholder,
  input[type=password]::placeholder,
  textarea::placeholder {
    color: var(--text-faint);
  }

  .help {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 0.4rem;
    line-height: 1.5;
  }
  .help code { font-size: 0.95em; }

  .radio-row, .checkbox-row { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 0.75rem; }
  .radio-row label, .checkbox-row label {
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
    cursor: pointer;
    padding: 0.4rem 0.5rem;
    border-radius: 4px;
    transition: background 120ms ease;
  }
  .radio-row label:hover, .checkbox-row label:hover { background: rgba(255,255,255,0.02); }
  .radio-row input[type=radio], .checkbox-row input[type=checkbox] {
    margin-top: 0.15rem;
    accent-color: var(--accent);
    flex-shrink: 0;
  }
  .radio-row label .radio-meta {
    display: block;
    color: var(--text-muted);
    font-size: 0.78rem;
    font-family: var(--mono);
    margin-top: 0.15rem;
  }
  .radio-warning {
    color: var(--warning);
    font-size: 0.78rem;
    font-family: var(--mono);
    margin-top: 0.15rem;
  }

  .form-actions {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border-soft);
  }

  /* === Toolbar (page header w/ actions) ================================= */
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 1.75rem;
    gap: 1rem;
  }
  .toolbar h2 { margin: 0; }
  .toolbar .actions-bar { display: flex; gap: 0.5rem; }

  /* === Code, paths, output ============================================== */
  code {
    font-family: var(--mono);
    font-size: 0.88em;
    color: var(--text);
    background: var(--surface-2);
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
    border: 1px solid var(--border-soft);
  }

  pre.output {
    background: #050608;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 1.25rem;
    border-radius: 6px;
    overflow-x: auto;
    overflow-y: auto;
    font-family: var(--mono);
    font-size: 0.82rem;
    line-height: 1.55;
    max-height: 580px;
    white-space: pre-wrap;
    word-break: break-word;
    margin: 0;
  }

  /* === Badges =========================================================== */
  .badge {
    display: inline-block;
    padding: 0.15rem 0.55rem;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 500;
    background: var(--surface-2);
    color: var(--text-muted);
    border: 1px solid var(--border);
    letter-spacing: 0.02em;
  }
  .badge::before { content: "["; color: var(--text-faint); }
  .badge::after  { content: "]"; color: var(--text-faint); }
  .badge-mirror   { color: var(--warning); border-color: rgba(251,191,36,.3); background: var(--warning-soft); }
  .badge-all      { color: var(--accent);  border-color: rgba(255,154,60,.3); background: var(--accent-soft);  }
  .badge-branches { color: var(--success); border-color: rgba(126,231,135,.3); background: var(--success-soft); }

  /* === Empty / footer =================================================== */
  .empty {
    text-align: center;
    padding: 3.5rem 2rem;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 6px;
  }
  .empty p { margin: 0 0 1.25rem; font-family: var(--mono); }

  .footer-note {
    color: var(--text-faint);
    font-family: var(--mono);
    font-size: 0.75rem;
    margin-top: 2.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border-soft);
  }
  .footer-note code { background: transparent; border: none; padding: 0; color: var(--text-muted); }

  /* === Login screen ===================================================== */
  .login-card {
    max-width: 420px;
    margin: 6rem auto 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2rem 2.25rem;
  }
  .login-card .brand-mark {
    font-family: var(--mono);
    font-size: 0.85rem;
    color: var(--accent);
    margin-bottom: 0.4rem;
  }
  .login-card h2 { margin-bottom: 1.5rem; }

  /* === Source/Dest cell layout ========================================== */
  .src-dest { font-family: var(--mono); font-size: 0.82rem; line-height: 1.6; }
  .src-dest .url { color: var(--text); word-break: break-all; }
  .src-dest .url-dest { color: var(--text-muted); }
  .src-dest .arrow { color: var(--accent); margin: 0 0.3rem; }

  /* Misc */
  .muted { color: var(--text-muted); }
  .mono { font-family: var(--mono); }

  /* === Danger zone (gated force-push) =================================== */
  details.force-zone { display: inline-block; position: relative; }
  details.force-zone > summary {
    list-style: none; cursor: pointer; display: inline-block;
  }
  details.force-zone > summary::-webkit-details-marker { display: none; }
  details.force-zone > summary::marker { content: ""; }
  .force-pop {
    margin-top: 0.5rem;
    border: 1px solid rgba(255,107,107,.35);
    border-radius: 6px;
    background: var(--danger-soft);
    padding: 0.75rem 0.85rem;
    max-width: 360px;
  }
  /* On the jobs table, float the popover so it doesn't stretch the row. */
  td.actions details.force-zone[open] > .force-pop {
    position: absolute; right: 0; z-index: 20;
    background: var(--surface-2);
    box-shadow: 0 6px 22px rgba(0,0,0,.45);
  }
  .force-pop .force-title {
    color: var(--danger); font-weight: 600; font-size: 0.8rem;
    text-transform: uppercase; letter-spacing: .04em; margin: 0 0 0.4rem;
  }
  .force-pop .force-check {
    display: flex; gap: 0.5rem; align-items: flex-start;
    font-size: 0.82rem; color: var(--text); margin-bottom: 0.6rem;
    text-align: left; line-height: 1.35; cursor: pointer;
  }
  .force-pop .force-check input { margin-top: 0.15rem; }
  .btn[disabled] { opacity: 0.45; cursor: not-allowed; }
  .btn[disabled]:hover { background: transparent; border-color: var(--border); }

  /* === Split button + dropdown menu (save-and-run) ===================== */
  .split-btn { display: inline-flex; align-items: stretch; }
  .split-btn > .btn:first-child { border-top-right-radius: 0; border-bottom-right-radius: 0; }
  .split-btn details.dropdown { position: relative; display: inline-block; }
  .split-btn summary.split-caret {
    list-style: none; cursor: pointer;
    border-top-left-radius: 0; border-bottom-left-radius: 0;
    border-left: 1px solid rgba(0,0,0,.25); margin-left: -1px;
    padding-left: 0.6rem; padding-right: 0.6rem;
  }
  summary.split-caret::-webkit-details-marker { display: none; }
  summary.split-caret::marker { content: ""; }
  .dropdown-menu {
    position: absolute; right: 0; margin-top: 0.4rem; z-index: 30;
    display: flex; flex-direction: column; gap: 0.35rem;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.5rem; min-width: 200px;
    box-shadow: 0 6px 22px rgba(0,0,0,.45);
  }
  .dropdown-menu .btn { text-align: left; white-space: nowrap; }
</style>
</head>
<body>
<header class="bar">
  <a href="{{ url_for('index') }}" class="brand">git_sync<span class="slash">//</span>web</a>
  {% if session.authed %}
  <nav>
    <a href="{{ url_for('index') }}">jobs</a>
    <a href="{{ url_for('edit_defaults') }}">defaults</a>
    <span class="user-tag"><span>user:</span> {{ username_display }}</span>
    <form method="post" action="{{ url_for('logout') }}" class="inline">
      <input type="hidden" name="csrf_token" value="{{ csrf_token_value }}">
      <button type="submit" class="btn btn-sm">logout</button>
    </form>
  </nav>
  {% endif %}
</header>
<main>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash flash-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
<script>
  // Danger-zone gating: a button stays disabled until its paired confirmation
  // checkbox is ticked. Delegated so any number of force zones work without
  // per-instance scripts. Pair via: checkbox.class="force-confirm"
  // data-target="<id>"  ->  button id="<id>".
  document.addEventListener("change", function (e) {
    var cb = e.target;
    if (cb && cb.classList && cb.classList.contains("force-confirm")) {
      var btn = document.getElementById(cb.dataset.target);
      if (btn) btn.disabled = !cb.checked;
    }
  });
  // Re-lock the checkbox/button whenever a force-zone disclosure is closed,
  // so a half-confirmed state can't linger after collapsing it.
  document.addEventListener("toggle", function (e) {
    var d = e.target;
    if (d && d.tagName === "DETAILS" && d.classList.contains("force-zone") && !d.open) {
      d.querySelectorAll(".force-confirm").forEach(function (cb) {
        cb.checked = false;
        var btn = document.getElementById(cb.dataset.target);
        if (btn) btn.disabled = true;
      });
    }
  }, true);
</script>
</body>
</html>
