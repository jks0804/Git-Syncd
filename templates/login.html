{% extends "base.html" %}
{% block title %}sign in — git_sync{% endblock %}
{% block content %}
<div class="login-card">
  <div class="brand-mark">▸ git_sync//web</div>
  <h2>Sign in</h2>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token_value }}">
    <label class="field">
      <span class="label">Username</span>
      <input type="text" name="username" autofocus required autocomplete="username">
    </label>
    <label class="field">
      <span class="label">Password</span>
      <input type="password" name="password" required autocomplete="current-password">
    </label>
    <div class="form-actions" style="margin-top: 0.5rem; padding-top: 0;">
      <button type="submit" class="btn btn-primary">Sign in</button>
    </div>
  </form>
</div>
{% endblock %}
