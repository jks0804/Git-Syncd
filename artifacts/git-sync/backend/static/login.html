<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitSyncd — Sign In</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="login-body">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="login-logo">
          <circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/>
          <path d="M13 6h3a2 2 0 0 1 2 2v7"/><line x1="6" y1="9" x2="6" y2="21"/>
        </svg>
        <div>
          <div class="login-brand-name">GitSyncd</div>
          <div class="login-brand-sub">Repo Sync Manager</div>
        </div>
      </div>

      <!-- Tab bar (shown only when registration is enabled) -->
      <div class="login-tabs hidden" id="login-tabs">
        <button class="login-tab active" id="tab-signin" onclick="switchTab('signin')">Sign in</button>
        <button class="login-tab" id="tab-register" onclick="switchTab('register')">Create account</button>
      </div>

      <!-- Sign-in panel -->
      <div id="panel-signin">
        <h1 class="login-title" id="title-signin">Sign in</h1>
        <p class="login-desc" id="desc-signin">Enter your credentials to access the dashboard.</p>
        <div id="login-error" class="login-error hidden"></div>
        <form id="login-form" onsubmit="doLogin(event)" autocomplete="on">
          <div class="form-group">
            <label for="l-username">Username</label>
            <input type="text" id="l-username" name="username" autocomplete="username" placeholder="admin" required autofocus />
          </div>
          <div class="form-group">
            <label for="l-password">Password</label>
            <div class="pw-wrap">
              <input type="password" id="l-password" name="password" autocomplete="current-password" placeholder="••••••••" required />
              <button type="button" class="pw-toggle" onclick="togglePw('l-password')" aria-label="Toggle password visibility">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="login-btn">Sign in</button>
        </form>
        <p class="login-hint" id="default-hint">Default credentials: <code>admin</code> / <code>admin123</code><br>Change your password after signing in.</p>
      </div>

      <!-- Register panel -->
      <div id="panel-register" class="hidden">
        <h1 class="login-title">Create account</h1>
        <p class="login-desc">Pick a username and password to get started.</p>
        <div id="reg-error" class="login-error hidden"></div>
        <form id="reg-form" onsubmit="doRegister(event)" autocomplete="on">
          <div class="form-group">
            <label for="r-username">Username</label>
            <input type="text" id="r-username" name="username" autocomplete="username" placeholder="Choose a username" minlength="3" required />
          </div>
          <div class="form-group">
            <label for="r-password">Password</label>
            <div class="pw-wrap">
              <input type="password" id="r-password" name="password" autocomplete="new-password" placeholder="at least 6 characters" minlength="6" required />
              <button type="button" class="pw-toggle" onclick="togglePw('r-password')" aria-label="Toggle">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label for="r-confirm">Confirm password</label>
            <div class="pw-wrap">
              <input type="password" id="r-confirm" name="confirm" autocomplete="new-password" placeholder="repeat password" required />
              <button type="button" class="pw-toggle" onclick="togglePw('r-confirm')" aria-label="Toggle">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="reg-btn">Create account</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    let _allowRegistration = false;

    async function init() {
      try {
        const res = await fetch("/v1/auth/status");
        const data = await res.json();
        _allowRegistration = !!data.allow_registration;
        if (_allowRegistration) {
          document.getElementById("login-tabs").classList.remove("hidden");
          document.getElementById("title-signin").classList.add("hidden");
          document.getElementById("desc-signin").classList.add("hidden");
          document.getElementById("default-hint").classList.add("hidden");
        }
      } catch (_) {}
    }

    function switchTab(tab) {
      const signin = tab === "signin";
      document.getElementById("panel-signin").classList.toggle("hidden", !signin);
      document.getElementById("panel-register").classList.toggle("hidden", signin);
      document.getElementById("tab-signin").classList.toggle("active", signin);
      document.getElementById("tab-register").classList.toggle("active", !signin);
      document.getElementById("login-error").classList.add("hidden");
      document.getElementById("reg-error").classList.add("hidden");
      if (signin) document.getElementById("l-username").focus();
      else document.getElementById("r-username").focus();
    }

    async function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById("login-btn");
      const errEl = document.getElementById("login-error");
      errEl.classList.add("hidden");
      btn.disabled = true;
      btn.textContent = "Signing in…";
      const username = document.getElementById("l-username").value.trim();
      const password = document.getElementById("l-password").value;
      try {
        const res = await fetch("/v1/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Login failed");
        window.location.href = "/";
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove("hidden");
        btn.disabled = false;
        btn.textContent = "Sign in";
      }
    }

    async function doRegister(e) {
      e.preventDefault();
      const btn = document.getElementById("reg-btn");
      const errEl = document.getElementById("reg-error");
      errEl.classList.add("hidden");
      const password = document.getElementById("r-password").value;
      const confirm = document.getElementById("r-confirm").value;
      if (password !== confirm) {
        errEl.textContent = "Passwords do not match";
        errEl.classList.remove("hidden");
        return;
      }
      btn.disabled = true;
      btn.textContent = "Creating account…";
      const username = document.getElementById("r-username").value.trim();
      try {
        const res = await fetch("/v1/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Registration failed");
        window.location.href = "/";
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove("hidden");
        btn.disabled = false;
        btn.textContent = "Create account";
      }
    }

    function togglePw(inputId) {
      const input = document.getElementById(inputId);
      input.type = input.type === "password" ? "text" : "password";
    }

    init();
  </script>
</body>
</html>
